# Temporary: run the volume/metadata snapshot on branch pushes so the data
# refresh doesn't depend on the erratic cron or a manual dispatch.
name: volume-once

on:
  push:
    branches: [claude/memelandia-style-site-sxchsu]

permissions:
  contents: write

concurrency:
  group: volume-once
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Snapshot volumes and token metadata
        run: node scripts/update-volumes.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update volume data"
            git push
          fi
